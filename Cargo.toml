[workspace]
members = ["crates/hledger-btc-core", "crates/hledger-btc"]
resolver = "2"

[workspace.dependencies]
# bitcoin
bdk_wallet = { version = "2.2", features = ["keys-bip39"] }
bdk_esplora = { version = "0.21", features = ["blocking"] }

# cli & config
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# errors
anyhow = "1"
thiserror = "2"

# secrets
keyring = "3"

# logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

dirs = "6"
